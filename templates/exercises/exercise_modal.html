<form id="exercise-modal-form" class="form-stack">
    {% if mode == "edit" %}
    <input type="hidden" name="exercise_id" id="exercise-modal-id" value="{{ exercise.pk }}">
    {% endif %}
    <h2 class="title-md m-0 mb-3">{% if mode == "edit" %}Edit Exercise{% else %}Add Exercise{% endif %}</h2>
    <label for="exercise-modal-name" class="form-label">Exercise Name</label>
    <input
        type="text"
        id="exercise-modal-name"
        name="name"
        class="form-control"
        autocomplete="off"
        value="{% if exercise %}{{ exercise.name }}{% endif %}"
    >
    <label for="exercise-modal-description" class="form-label">Description</label>
    <textarea
        id="exercise-modal-description"
        name="description"
        class="form-control"
        rows="3"
    >{% if exercise %}{{ exercise.description }}{% endif %}</textarea>
    <label for="exercise-modal-primary-bodypart" class="form-label">Primary Bodypart</label>
    <select id="exercise-modal-primary-bodypart" name="primary_bodypart" class="form-control">
        <option value="">Choose...</option>
        {% for code, label in bodypart_choices %}
        <option value="{{ code }}"{% if exercise and exercise.primary_bodypart == code %} selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    <label for="exercise-modal-secondary-bodypart" class="form-label">Secondary Bodypart</label>
    <select id="exercise-modal-secondary-bodypart" name="secondary_bodypart" class="form-control">
        <option value="">None</option>
        {% for code, label in bodypart_choices %}
        <option value="{{ code }}"{% if exercise and exercise.secondary_bodypart == code %} selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    <label for="exercise-modal-exercise-type" class="form-label">Exercise Type</label>
    <select id="exercise-modal-exercise-type" name="exercise_type" class="form-control">
        {% for code, label in exercise_type_choices %}
        <option value="{{ code }}"{% if exercise and exercise.exercise_type == code %} selected{% elif not exercise and code == 'accessory' %} selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    <div class="set-modal-actions mt-4">
        <button
            type="button"
            class="btn btn-primary"
            id="save-exercise-btn"
            data-function="click->saveExercise"
        >Save Exercise</button>
    </div>
</form>
