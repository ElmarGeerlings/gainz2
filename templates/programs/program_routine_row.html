<div
    class="panel program-routine-row stack-xs p-3"
    data-routine-id="{{ routine.pk }}"
>
    <div class="row-between gap-sm">
        <p class="title-sm m-0">
            <a data-slot="routine-link" href="{% url 'routine-detail' routine.pk %}?program={{ program.pk }}">
                <span data-slot="routine-name">{{ routine.name }}</span>
            </a><span class="text-muted text-sm"> - <span data-slot="exercise-count">{% if routine.exercise_count %}{{ routine.exercise_count }} exercises{% else %}no exercises{% endif %}</span></span>
        </p>
        <button
            type="button"
            class="icon-btn icon-btn-danger"
            data-function="click->removeProgramRoutine"
            aria-label="Remove routine"
        ><i class="fas fa-trash" aria-hidden="true"></i></button>
    </div>
</div>
