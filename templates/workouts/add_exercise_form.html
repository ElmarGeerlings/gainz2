<section class="panel stack-sm mt-5">
    <h3 class="title-sm">{{ section_title }}</h3>
    <form class="form-stack">
        {% if session_kind == "workout" %}
        <input type="hidden" name="workout_id" value="{{ session_pk }}">
        {% else %}
        <input type="hidden" name="routine_id" value="{{ session_pk }}">
        {% endif %}
        <span class="form-label">Exercise</span>
        <select
            id="bodypart-select-{{ session_pk }}"
            name="primary_bodypart"
            class="form-control"
            aria-label="Bodypart"
            data-session-id="{{ session_pk }}"
            data-endpoint="change->{{ endpoint_ns }}/refresh_add_exercise_options"
        >
            <option value="" selected>All bodyparts</option>
            {% for code, label in bodypart_choices %}
            <option value="{{ code }}">{{ label }}</option>
            {% endfor %}
        </select>
        <div id="add-exercise-select-wrap" class="form-stack">
            {% include "workouts/add_exercise_select.html" %}
        </div>
        <span class="form-label">Type (Optional)</span>
        <div class="gainz-dropdown gainz-dropdown-full">
            <button
                type="button"
                class="form-control row-between w-100"
                data-function="click->toggleGainzDropdown"
                aria-haspopup="listbox"
                aria-label="Exercise type"
            >
                <span data-slot="exercise-type-label">Default</span>
                <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <div class="gainz-dropdown-menu" hidden role="listbox">
                <button type="button" class="gainz-dropdown-item" data-function="click->selectExerciseType" data-value="">
                    Default
                </button>
                {% for type in exercise_type_choices %}
                <button type="button" class="gainz-dropdown-item row-center gap-sm" data-function="click->selectExerciseType" data-value="{{ type.value }}" data-label="{{ type.label }}">
                    {% include "components/exercise_type_badge.html" with exercise_type=type.value %} {{ type.label }}
                </button>
                {% endfor %}
            </div>
            <input type="hidden" name="exercise_type" value="">
        </div>
        <button
            type="button"
            class="btn btn-primary w-100"
            data-function="click->addExercise"
            data-session-id="{{ session_pk }}"
        >
            Add Exercise
        </button>
    </form>
</section>
