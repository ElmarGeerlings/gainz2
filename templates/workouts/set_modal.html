<form id="set-modal-form">
    {% if is_add %}
    {% if is_routine %}
    <input type="hidden" name="routine_exercise_id" value="{{ we.pk }}">
    {% else %}
    <input type="hidden" name="workout_exercise_id" value="{{ we.pk }}">
    {% endif %}
    {% else %}
    <input type="hidden" name="set_id" id="set-modal-set-id" value="{{ set.pk }}">
    {% endif %}
    <h2 class="title-md m-0 mb-3">{% if is_add %}Add set{% else %}Set{% endif %}</h2>
    <div class="set-modal-fields-row">
        <div class="value-picker" data-picker="weight" data-min="0" data-max="995" data-step="{{ weight_increment }}" data-unit="kg" aria-label="Weight">
            <div class="value-picker-window">
                <ul class="value-picker-list"></ul>
            </div>
        </div>
        <span class="set-modal-times" aria-hidden="true">X</span>
        <div class="value-picker" data-picker="reps" data-min="0" data-max="99" aria-label="Reps">
            <div class="value-picker-window">
                <ul class="value-picker-list">
                    {% for n in reps_range %}
                    <li class="value-picker-item" data-value="{{ n }}">{{ n }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
    <input type="hidden" name="weight" id="set-modal-weight" value="{{ weight }}">
    <input type="hidden" name="reps" id="set-modal-reps" value="{{ reps }}">
    <div class="stack-sm mt-4">
        {% if not is_add %}
        <div class="row-between gap-sm">
            <button
                type="button"
                class="btn{% if is_warmup %} btn-primary{% else %} btn-outline{% endif %}"
                data-function="click->toggleSetModalOption"
                data-set-modal-option="is_warmup"
                data-label-on="Warmup"
                data-label-off="No Warmup"
                aria-pressed="{% if is_warmup %}true{% else %}false{% endif %}"
            >{% if is_warmup %}Warmup{% else %}No Warmup{% endif %}</button>
            <input type="hidden" name="smartchange" id="set-modal-smartchange-input" value="{% if smartchange_enabled %}on{% endif %}">
            <button
                type="button"
                class="btn{% if smartchange_enabled %} btn-primary{% else %} btn-outline{% endif %}"
                data-function="click->toggleSetModalOption"
                data-set-modal-option="smartchange"
                data-label-on="Smart change"
                data-label-off="No Smart change"
                aria-pressed="{% if smartchange_enabled %}true{% else %}false{% endif %}"
            >{% if smartchange_enabled %}Smart change{% else %}No Smart change{% endif %}</button>
            <input type="hidden" name="is_warmup" id="set-modal-is_warmup-input" value="{% if is_warmup %}on{% endif %}">
        </div>
        {% else %}
        <div class="row-center gap-sm">
            <input type="hidden" name="is_warmup" id="set-modal-is_warmup-input" value="{% if is_warmup %}on{% endif %}">
            <button
                type="button"
                class="btn{% if is_warmup %} btn-primary{% else %} btn-outline{% endif %}"
                data-function="click->toggleSetModalOption"
                data-set-modal-option="is_warmup"
                data-label-on="Warmup"
                data-label-off="No Warmup"
                aria-pressed="{% if is_warmup %}true{% else %}false{% endif %}"
            >{% if is_warmup %}Warmup{% else %}No Warmup{% endif %}</button>
        </div>
        {% endif %}
        <div class="set-modal-actions">
            <button
                type="button"
                class="btn btn-primary set-modal-confirm"
                data-endpoint="click->{% if is_add %}{{ endpoint_ns }}/create_set{% else %}{{ endpoint_ns }}/update_set{% endif %}"
                data-close-modal="#set-modal"
            >Confirm</button>
        </div>
    </div>
</form>
