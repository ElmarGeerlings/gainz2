{% load formatting %}
<td>
    <button type="button" class="table-cell-trigger{% if not is_routine and set.weight_trend %} set-trend-{{ set.weight_trend }}{% endif %}" data-function="click->openSetModal" data-modal-name="set-modal" data-routing="{{ endpoint_ns }}/set_edit_modal_form" data-set-id="{{ set.pk }}">{{ set.weight|weight_display }}</button>
</td>
<td>
    <button type="button" class="table-cell-trigger{% if not is_routine and set.reps_trend %} set-trend-{{ set.reps_trend }}{% endif %}" data-function="click->openSetModal" data-modal-name="set-modal" data-routing="{{ endpoint_ns }}/set_edit_modal_form" data-set-id="{{ set.pk }}">{{ set.reps }}</button>
</td>
{% if not is_routine %}
<td class="text-center">
    <button
        type="button"
        class="btn{% if set.is_completed %} btn-success text-white{% else %} btn-outline{% endif %}"
        data-function="click->toggleSetDone"
        data-set-id="{{ set.pk }}"
        data-exercise-id="{{ we.pk }}"
        aria-label="Set done"
    ><i class="fas fa-check" aria-hidden="true"></i></button>
</td>
{% endif %}
<td>
    <button
        type="button"
        class="btn btn-danger text-white"
        data-endpoint="click->{{ endpoint_ns }}/delete_set"
        data-set-id="{{ set.pk }}"
        data-exercise-id="{{ we.pk }}"
        aria-label="Delete set"
    ><i class="fas fa-trash" aria-hidden="true"></i></button>
</td>
