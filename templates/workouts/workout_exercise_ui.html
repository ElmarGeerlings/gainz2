<div id="workout-exercise-ui" data-session-id="{{ session.pk }}" data-endpoint-ns="{{ endpoint_ns }}">
    <div class="exercise-view-toggle row-center justify-center gap-sm mb-3">
        <button
            type="button"
            class="btn btn-primary exercise-view-toggle-btn"
            data-function="click->setExerciseView"
            data-view="detail"
            data-ws-refresh-view="{{ endpoint_ns }}/refresh_exercise_view"
        >Detail</button>
        <button
            type="button"
            class="btn btn-outline exercise-view-toggle-btn"
            data-function="click->setExerciseView"
            data-view="overview"
            data-ws-refresh-view="{{ endpoint_ns }}/refresh_exercise_view"
        >Overview</button>
    </div>

    <div id="exercise-detail-view">
        {% include "workouts/exercise_detail_view.html" %}
    </div>

    <div id="exercise-overview-view" class="stack-lg hidden">
        {% include "workouts/exercise_overview_view.html" %}
    </div>
</div>
