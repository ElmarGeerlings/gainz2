{% extends "base.html" %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/routines.css' %}">
{% endblock %}

{% block content %}
<main class="page page-narrow">
    <header class="stack-sm mb-4">
        <h1 class="title-lg m-0">My Routines</h1>
        <div class="row-center gap-sm routines-list-actions">
            <select
                name="program_id"
                class="form-control"
                aria-label="Filter by program"
                data-endpoint="change->routines/filter_routines"
            >
                <option value="" selected>All Routines</option>
                {% for program in programs %}
                <option value="{{ program.pk }}">{{ program.name }}{% if program.is_active %} (active){% endif %}</option>
                {% endfor %}
            </select>
            <a href="{% url 'routine-import' %}" class="btn btn-outline"><i class="fas fa-file-import" aria-hidden="true"></i> Import</a>
            <a href="{% url 'new-routine' %}" class="btn btn-primary"><i class="fas fa-plus" aria-hidden="true"></i> New</a>
        </div>
    </header>
    <div id="routines-list-container" class="stack-sm">
        {% include "routines/routines_list_items.html" %}
    </div>
</main>
{% endblock %}
