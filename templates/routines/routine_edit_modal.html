<form id="routine-edit-form" class="form-stack">
    <input type="hidden" name="routine_id" id="routine-edit-id" value="">
    <h2 class="title-md m-0 mb-3">Edit routine</h2>
    <label for="routine-edit-name" class="form-label">Name</label>
    <input type="text" id="routine-edit-name" name="name" class="form-control" autocomplete="off">
    <label for="routine-edit-notes" class="form-label">Notes</label>
    <textarea id="routine-edit-notes" name="notes" class="form-control" rows="4"></textarea>
    <div class="set-modal-actions mt-4">
        <button
            type="button"
            class="btn btn-primary"
            data-endpoint="click->routines/update_routine"
            data-close-modal="#routine-modal"
        >Save</button>
    </div>
</form>
