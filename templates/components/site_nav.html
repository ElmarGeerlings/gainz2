<header class="site-nav">
    <div class="site-nav-inner row-between gap-sm p-3">
        <a class="site-nav-brand row-center gap-sm fw-700" href="{% url 'home' %}">
            <i class="fas fa-dumbbell" aria-hidden="true"></i> Gainz
        </a>

        <button
            type="button"
            class="site-nav-toggle"
            data-function="click->toggleSiteNav"
            aria-expanded="false"
            aria-controls="site-nav-menu"
            aria-label="Toggle navigation"
        >
            <i class="fas fa-bars" aria-hidden="true"></i>
        </button>

        <nav id="site-nav-menu" class="site-nav-menu" hidden>
            <ul class="site-nav-list">
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'home' %} is-active{% endif %}" href="{% url 'home' %}">
                        <i class="fas fa-home" aria-hidden="true"></i> Home
                    </a>
                </li>

                {% if user.is_authenticated %}
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'workouts-list' %} is-active{% endif %}" href="{% url 'workouts-list' %}">
                        <i class="fas fa-calendar-alt" aria-hidden="true"></i> Workouts
                    </a>
                </li>
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'exercises-list' %} is-active{% endif %}" href="{% url 'exercises-list' %}">
                        <i class="fas fa-list" aria-hidden="true"></i> Exercises
                    </a>
                </li>
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'routines-list' %} is-active{% endif %}" href="{% url 'routines-list' %}">
                        <i class="fas fa-clipboard-list" aria-hidden="true"></i> Routines
                    </a>
                </li>
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'programs-list' %} is-active{% endif %}" href="{% url 'programs-list' %}">
                        <i class="fas fa-project-diagram" aria-hidden="true"></i> Programs
                    </a>
                </li>
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'progress' %} is-active{% endif %}" href="{% url 'progress' %}">
                        <i class="fas fa-chart-line" aria-hidden="true"></i> Progress
                    </a>
                </li>

                {% if False %}
                <li class="site-nav-item">
                    <a class="site-nav-link" href="{% url 'home' %}">
                        <i class="fas fa-users" aria-hidden="true"></i> Social
                    </a>
                </li>
                <li class="site-nav-item">
                    <a class="site-nav-link" href="{% url 'home' %}">
                        <i class="fas fa-user" aria-hidden="true"></i> Profile
                    </a>
                </li>
                {% endif %}

                <li class="site-nav-item">
                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="site-nav-link site-nav-link-btn">
                            <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
                        </button>
                    </form>
                </li>
                {% else %}
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'login' %} is-active{% endif %}" href="{% url 'login' %}">
                        <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Login
                    </a>
                </li>
                <li class="site-nav-item">
                    <a class="site-nav-link{% if request.resolver_match.url_name == 'register' %} is-active{% endif %}" href="{% url 'register' %}">
                        <i class="fas fa-user-plus" aria-hidden="true"></i> Sign Up
                    </a>
                </li>
                {% endif %}
            </ul>
        </nav>
    </div>
</header>
